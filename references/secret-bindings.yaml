schema_version: 1
kind: kasa_secret_bindings
client_id: ""

rules:
  - Record binding metadata only
  - Never store secret values in this file or repository
  - Resolve values from an approved secret manager at runtime
  - Limit each binding to authorized consumers

record_contract:
  required_fields:
    - id
    - purpose
    - secret_reference
    - exposed_as
    - authorized_consumers
    - owner
    - lifecycle_status
  recommended_fields:
    - rotation_owner
    - last_rotated_at
    - expires_at
    - notes

bindings: []
